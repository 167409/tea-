<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tea to buy</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500&display=swap');

  :root{
    --leaf-100:#e4ead9;
    --leaf-300:#a9bd8e;
    --leaf-600:#5c7a4a;
    --leaf-800:#3a5230;
    --clay-50:#f6f1e7;
    --clay-100:#efe6d3;
    --clay-700:#7a5c3e;
    --ink:#2d2a22;
    --ink-soft:#6b6558;
    --line:#ddd3bd;
  }
  *{box-sizing:border-box;}
  body{margin:0;}
  .wrap{
    max-width:480px;
    margin:0 auto;
    background:var(--clay-50);
    font-family:'Inter',sans-serif;
    color:var(--ink);
    padding:2.5rem 1.75rem 3rem;
    border-radius:18px;
    border:1px solid var(--line);
  }
  .eyebrow{
    font-size:12px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--leaf-600);
    font-weight:500;
    margin:0 0 4px;
  }
  h1{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:32px;
    margin:0 0 6px;
    color:var(--leaf-800);
  }
  .sub{
    font-size:14px;
    color:var(--ink-soft);
    margin:0 0 1.75rem;
  }
  .add-row{
    display:flex;
    gap:8px;
    margin-bottom:1.5rem;
  }
  .add-row input[type=text]{
    flex:1;
    padding:11px 14px;
    border-radius:10px;
    border:1px solid var(--line);
    background:#fffdf8;
    font-family:'Inter',sans-serif;
    font-size:14px;
    color:var(--ink);
    outline:none;
    min-width:0;
  }
  .add-row input[type=text]:focus{border-color:var(--leaf-600);}
  .add-row input#amountInput{
    flex:0 0 88px;
  }
  .add-row button{
    padding:11px 18px;
    border-radius:10px;
    border:none;
    background:var(--leaf-800);
    color:#fdfaf3;
    font-family:'Inter',sans-serif;
    font-weight:500;
    font-size:14px;
    cursor:pointer;
  }
  .add-row button:active{transform:scale(0.97);}

  ul{list-style:none;margin:0;padding:0;}
  li{
    display:flex;
    align-items:center;
    gap:12px;
    padding:12px 4px;
    border-bottom:1px solid var(--line);
  }
  li:last-child{border-bottom:none;}
  .check{
    width:20px;height:20px;
    border-radius:6px;
    border:1.5px solid var(--leaf-300);
    flex-shrink:0;
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    background:#fffdf8;
  }
  .check.done{background:var(--leaf-600);border-color:var(--leaf-600);}
  .check svg{width:12px;height:12px;stroke:#fdfaf3;fill:none;stroke-width:3;display:none;}
  .check.done svg{display:block;}
  .name{
    flex:1;
    font-size:15px;
  }
  .amount{
    font-size:13px;
    color:var(--ink-soft);
    flex-shrink:0;
  }
  .done .name{
    text-decoration:line-through;
    color:var(--ink-soft);
  }
  .del{
    background:none;
    border:none;
    color:var(--ink-soft);
    font-size:18px;
    cursor:pointer;
    padding:2px 6px;
    line-height:1;
  }
  .del:hover{color:#a13d2b;}
  .empty{
    text-align:center;
    color:var(--ink-soft);
    font-size:14px;
    padding:2rem 0;
  }
  .footer{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:1.5rem;
    font-size:12px;
    color:var(--ink-soft);
  }
  .save{
    background:var(--clay-100);
    color:var(--clay-700);
    border:none;
    border-radius:8px;
    padding:8px 14px;
    font-size:13px;
    font-weight:500;
    cursor:pointer;
    font-family:'Inter',sans-serif;
  }
  .save:active{transform:scale(0.97);}
  .status{opacity:0;transition:opacity .3s;}
  .status.show{opacity:1;}
</style>
</head>
<body>
<div class="wrap">
  <p class="eyebrow">Buying list</p>
  <h1>Tea</h1>
  <p class="sub">Add what you need to pick up. Check it off once it's in the basket.</p>

  <div class="add-row">
    <input type="text" id="itemInput" placeholder="e.g. Assam loose leaf" maxlength="60" />
    <!-- Updated placeholder with ₹ symbol -->
    <input type="text" id="amountInput" placeholder="₹ Amount" maxlength="20" />
    <button id="addBtn">Add</button>
  </div>

  <ul id="list"></ul>
  <p class="empty" id="emptyMsg" style="display:none;">Nothing on the list yet.</p>

  <div class="footer">
    <span id="status" class="status">Saved</span>
    <button class="save" id="saveBtn">Save list</button>
  </div>
</div>

<script>
let items = [];
const listEl = document.getElementById('list');
const emptyMsg = document.getElementById('emptyMsg');
const input = document.getElementById('itemInput');
const amountInput = document.getElementById('amountInput');
const statusEl = document.getElementById('status');

function render(){
  listEl.innerHTML = '';
  emptyMsg.style.display = items.length ? 'none' : 'block';
  items.forEach((item, i) => {
    const li = document.createElement('li');
    if(item.done) li.classList.add('done');

    const check = document.createElement('div');
    check.className = 'check' + (item.done ? ' done' : '');
    check.innerHTML = '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>';
    check.onclick = () => { items[i].done = !items[i].done; render(); save(); };

    const name = document.createElement('span');
    name.className = 'name';
    name.textContent = item.name;

    const del = document.createElement('button');
    del.className = 'del';
    del.textContent = '\u00d7';
    del.setAttribute('aria-label', 'Delete');
    del.onclick = () => { items.splice(i,1); render(); save(); };

    li.appendChild(check);
    li.appendChild(name);
    if(item.amount){
      const amount = document.createElement('span');
      amount.className = 'amount';
      
      // Automatically prefixes ₹ if the user enters just a number
      const displayAmount = item.amount.startsWith('₹') ? item.amount : `₹${item.amount}`;
      amount.textContent = displayAmount;
      
      li.appendChild(amount);
    }
    li.appendChild(del);
    listEl.appendChild(li);
  });
}

function addItem(){
  const val = input.value.trim();
  if(!val) return;
  const amt = amountInput.value.trim();
  items.push({name: val, amount: amt, done: false});
  input.value = '';
  amountInput.value = '';
  input.focus();
  render();
  save();
}

document.getElementById('addBtn').onclick = addItem;
input.addEventListener('keydown', e => { if(e.key === 'Enter') addItem(); });
amountInput.addEventListener('keydown', e => { if(e.key === 'Enter') addItem(); });

function save(){
  try{
    localStorage.setItem('tea-buying-list', JSON.stringify(items));
    statusEl.textContent = 'Saved';
    statusEl.style.color = '';
    statusEl.classList.add('show');
    setTimeout(()=>statusEl.classList.remove('show'), 1500);
  }catch(e){
    console.error('Save failed', e);
    statusEl.textContent = 'Save failed, try again';
    statusEl.style.color = '#a13d2b';
    statusEl.classList.add('show');
  }
}
document.getElementById('saveBtn').onclick = save;

function load(){
  try{
    const raw = localStorage.getItem('tea-buying-list');
    if(raw){
      items = JSON.parse(raw);
    }
  }catch(e){
    items = [];
  }
  render();
}
load();
</script>
</body>
</html>
